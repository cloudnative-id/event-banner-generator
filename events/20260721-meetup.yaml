# Image dimensions
width: 904
height: 1280

# Background configuration
background:
  gradient:
    start: '#C2185B'  # Pink
    end: '#313178'    # Purple

# Logos at the top (multiple logos)
logos:
  - path: assets/logos/cncf-indonesia-logo.webp
    size: [90, 90]

# Output formats
output_formats:
  - webp
  - jpg

# Event title
title:
  text: "Kubernetes Cloud Native Offline Meetup July 2026"
  color: '#FFFFFF'
  size: 50
  y_position: 200

# Event details (date and time)
details:
  text: "July 21, 2026 | 17:30 WIB | https://cloudnative.id"
  color: '#FFFFFF'
  size: 32
  y_position: 330

# Location
location:
  text: "AWS Jakarta Office, Sinarmas MSIG Tower, Lantai 16"
  color: '#FFFFFF'
  size: 28
  y_position: 375

# Speakers configuration
speakers_y_start: 450
speaker_spacing: 250

speakers:
  - name: "Pugar Jayanegara"
    role: "Senior Solution Architect @ Amazon Web Services"
    talk_title: "Whats new in EKS and AWS Container services"
    photo: "assets/photos/pujar-jayanegara.webp"
    circular_photo: true
    photo_size: [200, 200]
    photo_x: 40
    name_size: 42
    name_color: '#FFFFFF'
    role_size: 24
    role_color: '#E0E0E0'
    talk_size: 28
    talk_color: '#FFFFFF'

  - name: "Prasta Maha"
    role: "Organizer @ Cloud Native Indonesia"
    talk_title: "Agentgateway: One Gateway for All Your AI Agents on Kubernetes"
    photo: "assets/photos/prasta-maha.webp"
    circular_photo: true
    photo_size: [200, 200]
    photo_x: 40
    name_size: 42
    name_color: '#FFFFFF'
    role_size: 24
    role_color: '#E0E0E0'
    talk_size: 28
    talk_color: '#FFFFFF'

# Footer (Organized By)
footer:
  text: "Organized by Cloud Native Indonesia"
  color: '#FFFFFF'
  size: 30
  z_position: 10
  y_position: 1000
  logo: assets/logos/cncf-indonesia-logo.webp
  logo_size: [80, 80]